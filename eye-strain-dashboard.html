<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adaptive Eye Strain Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:24px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
header h1{font-size:22px;font-weight:700;letter-spacing:-0.3px;color:#f1f5f9}
.badge{display:inline-flex;align-items:center;gap:6px;background:#064e3b;color:#6ee7b7;font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;letter-spacing:0.5px}
.badge::before{content:'';width:7px;height:7px;background:#34d399;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.grid-main{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:768px){.grid-main{grid-template-columns:1fr}}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;overflow:hidden}
.webcam-card{display:flex;flex-direction:column}
.webcam-area{aspect-ratio:4/3;background:#0f172a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#475569;border-bottom:1px solid #334155}
.webcam-area svg{width:48px;height:48px;stroke:#475569;fill:none;stroke-width:1.5}
.webcam-area span{font-size:13px;font-weight:500}
.webcam-footer{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#94a3b8}
.webcam-footer .label{font-weight:500}
.webcam-footer .value{font-family:'Inter',monospace;color:#e2e8f0;font-weight:600}
.right-col{display:flex;flex-direction:column;gap:20px}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.metric-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.metric-card .label{font-size:12px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.metric-card .label svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.metric-card .value{font-size:32px;font-weight:700;color:#f1f5f9;letter-spacing:-1px}
.metric-card .unit{font-size:14px;font-weight:400;color:#64748b;margin-left:2px}
.metric-card.strain .value{color:#34d399}
.metric-card.strain .badge-low{display:inline-block;background:#064e3b;color:#6ee7b7;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;margin-left:8px;vertical-align:middle;letter-spacing:0.3px}
.ear-bar{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:24px;font-size:13px}
.ear-bar .ear-item{display:flex;align-items:center;gap:8px}
.ear-bar .ear-label{color:#64748b;font-weight:500}
.ear-bar .ear-value{color:#22d3ee;font-weight:700;font-size:18px;font-family:'Inter',monospace}
.ear-bar .divider{width:1px;height:24px;background:#334155}
.chart-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;flex:1}
.chart-card h3{font-size:13px;color:#64748b;font-weight:500;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:16px}
.chart-container{position:relative;height:140px}
.chart-container svg{width:100%;height:100%}
.chart-line{fill:none;stroke:#06b6d4;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chart-area{fill:url(#chartGrad);opacity:0.3}
.chart-grid line{stroke:#1e293b;stroke-width:1}
.chart-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#475569;font-weight:500}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Adaptive Eye Strain Dashboard</h1>
    <div class="badge">TRACKING ACTIVE</div>
  </header>
  <div class="grid-main">
    <div class="card webcam-card">
      <div class="webcam-area">
        <svg viewBox="0 0 48 48"><rect x="4" y="10" width="40" height="28" rx="4"/><circle cx="24" cy="24" r="7"/><circle cx="24" cy="24" r="3"/><rect x="18" y="6" width="12" height="6" rx="2"/></svg>
        <span>Camera Feed — Paused</span>
      </div>
      <div class="webcam-footer">
        <div><span class="label">Resolution</span></div>
        <div><span class="value">640 × 480</span></div>
        <div><span class="label">FPS</span></div>
        <div><span class="value">30</span></div>
      </div>
    </div>
    <div class="right-col">
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="label"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Total Blinks</div>
          <div class="value">47</div>
        </div>
        <div class="metric-card">
          <div class="label"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Blink Rate</div>
          <div class="value">14<span class="unit"> bpm</span></div>
        </div>
        <div class="metric-card strain">
          <div class="label"><svg viewBox="0 0 24 24"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>Current Strain</div>
          <div class="value">Low<span class="badge-low">Healthy</span></div>
        </div>
        <div class="metric-card">
          <div class="label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Screen Time</div>
          <div class="value">23.5<span class="unit"> min</span></div>
        </div>
      </div>
      <div class="ear-bar">
        <div class="ear-item"><span class="ear-label">Current EAR</span><span class="ear-value">0.421</span></div>
        <div class="divider"></div>
        <div class="ear-item"><span class="ear-label">EAR Threshold</span><span class="ear-value">0.272</span></div>
        <div class="divider"></div>
        <div class="ear-item"><span class="ear-label">Status</span><span style="color:#34d399;font-weight:600">Normal</span></div>
      </div>
      <div class="chart-card">
        <h3>Blink Rate Over Time</h3>
        <div class="chart-container">
          <svg viewBox="0 0 500 140" preserveAspectRatio="none">
            <defs><linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0f172a"/></linearGradient></defs>
            <path class="chart-area" d="M0,100 L50,85 100,90 150,60 200,70 250,45 300,55 350,30 400,50 450,35 500,40 L500,140 L0,140Z"/>
            <path class="chart-line" d="M0,100 L50,85 100,90 150,60 200,70 250,45 300,55 350,30 400,50 450,35 500,40"/>
            <g fill="#06b6d4">
              <circle cx="0" cy="100" r="3"/><circle cx="50" cy="85" r="3"/><circle cx="100" cy="90" r="3"/><circle cx="150" cy="60" r="3"/><circle cx="200" cy="70" r="3"/><circle cx="250" cy="45" r="3"/><circle cx="300" cy="55" r="3"/><circle cx="350" cy="30" r="3"/><circle cx="400" cy="50" r="3"/><circle cx="450" cy="35" r="3"/><circle cx="500" cy="40" r="3"/>
            </g>
          </svg>
        </div>
        <div class="chart-labels">
          <span>0:00</span><span>5:00</span><span>10:00</span><span>15:00</span><span>20:00</span><span>23:30</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
